services:
  - type: web
    name: friday-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MCP_SECRET
        value: friday-mcp-2025
      - key: TVA_AUTH_URL
        sync: false

  - type: web
    name: friday-mcp
    runtime: node
    buildCommand: npm install
    startCommand: node mcp-server.js
    envVars:
      - key: FRIDAY_URL
        sync: false
      - key: MCP_SECRET
        value: friday-mcp-2025
      - key: MCP_AUTH_TOKEN
        sync: false
